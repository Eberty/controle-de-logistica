name: Deploy Staging

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=staging-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.image_repo }}/backend:staging
            ghcr.io/${{ steps.meta.outputs.image_repo }}/backend:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,scope=backend-staging,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.image_repo }}/frontend:staging
            ghcr.io/${{ steps.meta.outputs.image_repo }}/frontend:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,scope=frontend-staging,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: app

      - name: Deploy containers on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="$HOME/app"
            cd "$APP_DIR"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cat > .env <<'ENVEOF'
            IMAGE_REPO=${{ needs.build-and-push.outputs.image_repo }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            ASPNETCORE_ENVIRONMENT=Staging
            DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
            ALLOWED_ORIGIN=${{ vars.APP_ORIGIN }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_KEY_PREFIX=${{ vars.AWS_S3_KEY_PREFIX }}
            ENVEOF
            chmod 600 .env
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
            docker image prune -af --filter "until=72h"
