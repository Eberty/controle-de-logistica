x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  proxy:
    image: nginx:1.28-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST}
      API_HOST: ${API_HOST}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - backend
      - frontend

  backend:
    image: ghcr.io/${IMAGE_REPO}/backend:${IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Database__Provider: PostgreSQL
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Storage__Provider: S3
      Storage__S3__Bucket: ${AWS_S3_BUCKET_NAME}
      Storage__S3__Region: ${AWS_REGION}
      Storage__S3__AccessKey: ${AWS_ACCESS_KEY_ID}
      Storage__S3__SecretKey: ${AWS_SECRET_ACCESS_KEY}
      Storage__S3__KeyPrefix: ${AWS_S3_KEY_PREFIX:-}
      AllowedOrigins__0: ${ALLOWED_ORIGIN}
      Proxy__TrustForwardedHeaders: "true"
      Proxy__KnownNetworks__0: 172.28.0.0/16

  frontend:
    image: ghcr.io/${IMAGE_REPO}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - backend

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
