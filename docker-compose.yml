services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: asset
      POSTGRES_PASSWORD: asset_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset -d asset_management"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Provider: PostgreSQL
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=asset_management;Username=asset;Password=asset_local_dev
      Storage__Provider: Local
      Storage__LocalPath: /app/Data/images
    ports:
      - "5256:8080"
    volumes:
      - backend_images:/app/Data/images
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:5256
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  backend_images:
  frontend_node_modules:
